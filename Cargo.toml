[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.0.1"
edition = "2021"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mathieuouillon/root-rs"

[workspace.dependencies]
root-io-core = { path = "crates/root-io-core" }
root-compress = { path = "crates/root-compress" }
root-rntuple = { path = "crates/root-rntuple" }
root-hist = { path = "crates/root-hist" }

[profile.release]
opt-level = 3
lto = "thin"
