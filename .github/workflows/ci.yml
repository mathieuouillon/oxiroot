name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test / lint / fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Run examples (smoke)
        # The showcase examples drive the method-based read/write API end to end —
        # the RootFile builder (multi-object, subdirectory, append), read_root_in,
        # Tree/Ntuple::write_root, and nested RNTuple round-trips — so a regression
        # in any of them fails CI (each asserts against its own written output).
        run: |
          cargo run -q -p oxiroot --example analysis
          cargo run -q -p oxiroot --example tree
          cargo run -q -p oxiroot --example rntuple_nested
          cargo run -q -p oxiroot --example plot --features plot

  fuzz-build:
    name: fuzz targets build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build fuzz targets
        working-directory: fuzz
        # Compile-only: a real campaign runs out of band, but this keeps the
        # harness from rotting against API changes.
        run: cargo +nightly fuzz build

  interop-uproot:
    name: interop (uproot)
    # Round-trip against uproot (the Python ROOT-IO library): Rust writes a
    # histogram + RNTuple + TTree + a RootFile-built multi-object/subdirectory
    # file + an appended file, all of which uproot reads; uproot writes a
    # histogram + TTree + a subdirectory file that Rust reads (the subdirectory
    # via read_root_in). (uproot's TTree writer can't emit std::vector, so that
    # branch is exercised only in the ROOT C++ job.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uproot
        run: pip install uproot numpy awkward

      - name: Build interop driver
        run: cargo build -p oxiroot --example interop

      - name: Rust writes → uproot reads
        run: |
          mkdir -p /tmp/interop
          cargo run -q -p oxiroot --example interop -- write /tmp/interop
          python scripts/interop_uproot.py read /tmp/interop

      - name: uproot writes → Rust reads
        run: |
          python scripts/interop_uproot.py write /tmp/interop
          cargo run -q -p oxiroot --example interop -- read /tmp/interop

  interop-root:
    name: interop (ROOT C++)
    # Round-trip against an official ROOT build: ROOT C++ writes a histogram +
    # RNTuple + TTree (incl. a std::vector branch) + a subdirectory file that
    # Rust reads (the subdirectory via read_root_in), and Rust writes a histogram
    # + RNTuple + TTree + a RootFile-built multi-object/subdirectory file + an
    # appended file that ROOT C++ reads. The TTree covers scalar, fixed array,
    # string, jagged, and std::vector branches both ways. Pin the image tag if
    # upstream RNTuple format drift is a concern.
    runs-on: ubuntu-latest
    container: rootproject/root:latest
    # The container runs as root; align HOME with root's actual home so rustup
    # doesn't mistake the GitHub-set HOME for a sudo invocation, and so the
    # toolchain it installs is found by later steps. Applies to every step.
    #
    # That HOME also reaches the host-side `docker exec` the runner uses to run
    # each step, so its docker CLI tries to read root's ~/.docker/config.json
    # (unreadable by the runner user) and prints a benign "permission denied"
    # warning. Point DOCKER_CONFIG at an empty dir so docker finds no config and
    # stays quiet — it doesn't need one here (the image is already pulled).
    env:
      HOME: /root
      DOCKER_CONFIG: /tmp
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build interop driver
        run: cargo build -p oxiroot --example interop

      - name: Build ROOT C++ oracle
        run: c++ $(root-config --cflags) scripts/interop_root.cpp $(root-config --libs) -lROOTNTuple -o /tmp/interop_root

      - name: ROOT C++ writes → Rust reads
        run: |
          mkdir -p /tmp/interop
          /tmp/interop_root write /tmp/interop
          cargo run -q -p oxiroot --example interop -- read /tmp/interop

      - name: Rust writes → ROOT C++ reads
        run: |
          cargo run -q -p oxiroot --example interop -- write /tmp/interop
          /tmp/interop_root read /tmp/interop
